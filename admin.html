<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Band Config Generator</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 40px auto; max-width: 600px; padding: 0 20px; line-height: 1.6; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    .form-group { margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input[type="text"], input[type="url"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { background-color: #0066cc; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
    button:hover { background-color: #0052a3; }
    #downloadSection { margin-top: 25px; padding: 15px; background-color: #e9ecef; border-radius: 6px; display: none; }
    .download-btn { display: block; text-align: center; background-color: #28a745; color: white; text-decoration: none; padding: 12px 0; border-radius: 4px; font-weight: bold; margin-top: 10px; }
    .download-btn:hover { background-color: #218838; }
  </style>
</head>
<body>

  <h1>🎸 Band Config Generator</h1>
  <p>Fill out your details below to generate your repository's <code>config.json</code> file.</p>

  <form id="adminForm">
    <div class="form-group">
      <label for="bandName">Band Name:</label>
      <input type="text" id="bandName" required placeholder="e.g. The Midnight Echoes">
    </div>

    <div class="form-group">
      <label for="bandMembers">Band Members (comma separated):</label>
      <input type="text" id="bandMembers" required placeholder="John, Sarah, Alex">
    </div>

    <div class="form-group">
      <label for="googleSheetsDeployUrl">Google Sheets Web App URL:</label>
      <input type="url" id="googleSheetsDeployUrl" required placeholder="https://script.google.com/macros/s/.../exec">
    </div>

    <div class="form-group">
      <label for="ugPlaylistUrl">Ultimate Guitar Playlist Link:</label>
      <input type="url" id="ugPlaylistUrl" required placeholder="https://www.ultimate-guitar.com/user/playlist/...">
    </div>

    <button type="submit" id="buildBtn">Build config.json</button>
  </form>

  <div id="downloadSection">
    <p><strong>✅ Config generated successfully!</strong></p>
    <p>Click below to download your <code>config.json</code> file and place it into your project's root folder:</p>
    <a id="downloadBtn" class="download-btn" download="config.json">📥 Download config.json</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('adminForm');
      const downloadSection = document.getElementById('downloadSection');
      const downloadBtn = document.getElementById('downloadBtn');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        console.log("🚀 Form submitted! Generating JSON blob...");

        try {
          // 1. Extract values
          const configData = {
            bandName: document.getElementById('bandName').value.trim(),
            bandMembers: document.getElementById('bandMembers').value.split(',').map(m => m.trim()),
            googleSheetsDeployUrl: document.getElementById('googleSheetsDeployUrl').value.trim(),
            ugPlaylistUrl: document.getElementById('ugPlaylistUrl').value.trim(),
            generatedAt: new Date().toISOString()
          };

          // 2. Convert to formatted JSON
          const jsonString = JSON.stringify(configData, null, 2);

          // 3. Create blob download link
          const blob = new Blob([jsonString], { type: 'application/json' });
          const objectUrl = URL.createObjectURL(blob);

          // 4. Attach to download link and show container
          downloadBtn.href = objectUrl;
          downloadSection.style.display = 'block';

          console.log("✅ Download link attached successfully.");
        } catch (err) {
          console.error("❌ Generation Error:", err);
          alert("Error generating file: " + err.message);
        }
      });
    });
  </script>
</body>
</html>
