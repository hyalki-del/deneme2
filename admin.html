<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Setup</title>
</head>
<body>
  <h1>Band Configuration</h1>

  <form id="adminForm">
    <p>
      <label for="bandName">Band Name:</label><br>
      <input type="text" id="bandName" name="bandName" required>
    </p>

    <p>
      <label for="bandMembers">Band Member Names (comma separated):</label><br>
      <input type="text" id="bandMembers" name="bandMembers" placeholder="John, Sarah, Alex" required>
    </p>

    <p>
      <label for="bandPhotos">Band Photos (optional):</label><br>
      <input type="file" id="bandPhotos" name="bandPhotos" accept="image/*" multiple>
    </p>

    <p>
      <label for="googleSheetsDeployUrl">Google Sheets Deploy Web Link:</label><br>
      <input type="url" id="googleSheetsDeployUrl" name="googleSheetsDeployUrl" required>
    </p>

    <p>
      <label for="ugPlaylistUrl">UG Playlist Link:</label><br>
      <input type="url" id="ugPlaylistUrl" name="ugPlaylistUrl" required>
    </p>

    <p>
      <button type="submit">Save Configuration</button>
    </p>
  </form>

  <div id="status"></div>

  <script src="js/admin.js"></script>
</body>
</html>
