<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>Band Ops — Repository Package Generator</title>

  <!-- Google Typography & Font Awesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- JSZip & FileSaver Engine Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --bg-dark: #0a0a0c;
      --bg-card: rgba(18, 18, 21, 0.85);
      --bg-secondary: #16161a;
      --border-dark: #26262e;
      --border-red: #d31010;
      --accent-red: #d31010;
      --accent-red-hover: #ff1e1e;
      --accent-red-glow: rgba(211, 16, 16, 0.4);
      --text-main: #f0f0f5;
      --text-muted: #8e8e99;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-display: 'Oswald', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-sm: 6px;
      --radius-md: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(211, 16, 16, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(0, 187, 255, 0.05) 0%, transparent 40%);
    }

    .generator-card {
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-md);
      padding: 40px;
      width: 100%;
      max-width: 720px;
      backdrop-filter: blur(16px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6);
    }

    .header-zone {
      border-bottom: 1px solid var(--border-dark);
      padding-bottom: 20px;
      margin-bottom: 28px;
    }

    .header-zone h1 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-zone p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-sm);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-red);
      box-shadow: 0 0 12px var(--accent-red-glow);
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .action-zone {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn-generate {
      width: 100%;
      padding: 16px;
      background: var(--accent-red);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 20px var(--accent-red-glow);
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .btn-generate:hover {
      background: var(--accent-red-hover);
      transform: translateY(-2px);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    .status-log {
      background: var(--bg-secondary);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: #00ffcc;
      display: none;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <main class="generator-card">
    <header class="header-zone">
      <h1><i class="fa-solid fa-boxes-packing" style="color: var(--accent-red);"></i> Band Ops Generator</h1>
      <p>Configure your band variables below to generate a zero-dependency, GitHub Pages-ready ZIP package.</p>
    </header>

    <form id="setupForm" onsubmit="generateCodePack(event)">
      <div class="form-grid">
        
        <div class="form-group">
          <label for="bandName">Band Name</label>
          <input type="text" id="bandName" value="BLACK RITUAL" required>
        </div>

        <div class="form-group">
          <label for="brandInitials">Brand Initials (Logo Badge)</label>
          <input type="text" id="brandInitials" value="BR" maxlength="3" required>
        </div>

        <div class="form-group full-width">
          <label for="tagline1">Tagline Line 1</label>
          <input type="text" id="tagline1" value="FORGE THE SOUND.">
        </div>

        <div class="form-group full-width">
          <label for="tagline2">Tagline Line 2</label>
          <input type="text" id="tagline2" value="LIVE THE MISSION.">
        </div>

        <div class="form-group full-width">
          <label for="googleScriptUrl">Google Apps Script Web App URL</label>
          <input type="url" id="googleScriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
          <span class="hint">Leave empty if you haven't deployed your Google Sheet Web App yet.</span>
        </div>

        <div class="form-group full-width">
          <label for="ugPlaylistUrl">Ultimate Guitar Playlist URL</label>
          <input type="url" id="ugPlaylistUrl" placeholder="https://www.ultimate-guitar.com/user/playlist/...">
          <span class="hint">Used by Google Apps Script to daily-scrape track names into Google Sheets.</span>
        </div>

        <div class="form-group full-width">
          <label for="members">Band Members &amp; Roles (Comma Separated)</label>
          <input type="text" id="members" value="Vocals, Guitar 1, Guitar 2, Bass, Drums" required>
        </div>

      </div>

      <div class="action-zone">
        <button type="submit" class="btn-generate">
          <i class="fa-solid fa-file-zipper"></i> GENERATE CODE PACK (.ZIP)
        </button>
        <div id="statusLog" class="status-log"></div>
      </div>
    </form>
  </main>

  <script>
    async function generateCodePack(e) {
      e.preventDefault();

      const logEl = document.getElementById('statusLog');
      logEl.style.display = 'block';
      logEl.textContent = "⏳ Initializing JSZip package builder...\n";

      const zip = new JSZip();

      // Extract Inputs
      const configData = {
        bandName: document.getElementById('bandName').value.trim(),
        brandInitials: document.getElementById('brandInitials').value.trim().toUpperCase(),
        taglineLine1: document.getElementById('tagline1').value.trim(),
        taglineLine2: document.getElementById('tagline2').value.trim(),
        subtext: "Operations for bands who rehearse hard and perform harder.",
        googleScriptUrl: document.getElementById('googleScriptUrl').value.trim(),
        ugPlaylistUrl: document.getElementById('ugPlaylistUrl').value.trim(),
        members: document.getElementById('members').value.split(',').map(m => m.trim())
      };

      logEl.textContent += "⚙️ Generating directory hierarchy & template files...\n";

      // Create Directories
      const cssFolder = zip.folder("css");
      const jsFolder = zip.folder("js");
      const dataFolder = zip.folder("data");
      const backendFolder = zip.folder("backend");
      const workflowsFolder = zip.folder(".github/workflows");

      // -------------------------------------------------------------
      // 1. FILE: js/config.js
      // -------------------------------------------------------------
      jsFolder.file("config.js", `/**
 * BAND OPS CENTRAL CONFIGURATION
 * Generated automatically via setup.html
 */
const BAND_CONFIG = ${JSON.stringify(configData, null, 2)};

// Apply brand logo initials globally on DOM load
document.addEventListener("DOMContentLoaded", () => {
  const logoElements = document.querySelectorAll('.brand-logo');
  logoElements.forEach(el => el.textContent = BAND_CONFIG.brandInitials || "BR");
});
`);

      // -------------------------------------------------------------
      // 2. FILE: js/api.js
      // -------------------------------------------------------------
      jsFolder.file("api.js", `/**
 * DECOUPLED SERVICE LAYER
 * Reads static JSON pre-rendered cache; posts state mutations to Google Apps Script.
 */
const ApiService = {
  
  async getPlaylist() {
    try {
      const response = await fetch('data/playlist.json');
      if (response.ok) {
        const result = await response.json();
        return result.data || result;
      }
      throw new Error("Static playlist.json missing");
    } catch (err) {
      if (BAND_CONFIG.googleScriptUrl) {
        const liveRes = await fetch(\`\${BAND_CONFIG.googleScriptUrl}?action=getPlaylist\`);
        const liveJson = await liveRes.json();
        return liveJson.data || [];
      }
      return [];
    }
  },

  async getCalendar() {
    try {
      const response = await fetch('data/calendar.json');
      if (response.ok) {
        const result = await response.json();
        return result.data || result;
      }
      throw new Error("Static calendar.json missing");
    } catch (err) {
      if (BAND_CONFIG.googleScriptUrl) {
        const liveRes = await fetch(\`\${BAND_CONFIG.googleScriptUrl}?action=getCalendar\`);
        const liveJson = await liveRes.json();
        return liveJson.data || [];
      }
      return [];
    }
  },

  async updateOrder(songIdArray) {
    return this._post({ action: 'updateOrder', playlist: songIdArray });
  },

  async updateKey(songId, newKey) {
    return this._post({ action: 'updateKey', songId, newKey });
  },

  async fetchLyrics(title, artist) {
    const getUrl = \`https://lrclib.net/api/get?artist_name=\${encodeURIComponent(artist)}&track_name=\${encodeURIComponent(title)}\`;
    try {
      const response = await fetch(getUrl, {
        headers: { 'User-Agent': 'BandOpsApp/1.0' }
      });
      if (response.ok) {
        const data = await response.json();
        return data.plainLyrics || data.syncedLyrics || "Plain lyrics not available.";
      }
      return "Lyrics not found in LRCLIB database.";
    } catch (err) {
      return "Network error while fetching lyrics.";
    }
  },

  async _post(payload) {
    if (!BAND_CONFIG.googleScriptUrl) return;
    try {
      const response = await fetch(BAND_CONFIG.googleScriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (err) {
      console.error("API POST Error:", err);
      throw err;
    }
  }
};
`);

      // -------------------------------------------------------------
      // 3. FILE: css/style.css
      // -------------------------------------------------------------
      cssFolder.file("style.css", `/* UNIVERSAL CROSS-PLATFORM DESIGN SYSTEM */
:root {
  --bg-dark: #0a0a0c;
  --bg-card: rgba(18, 18, 21, 0.85);
  --bg-secondary: #16161a;
  --border-dark: #26262e;
  --border-red: #d31010;
  --accent-red: #d31010;
  --accent-red-hover: #ff1e1e;
  --accent-red-glow: rgba(211, 16, 16, 0.4);
  --text-main: #f0f0f5;
  --text-muted: #8e8e99;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-display: 'Oswald', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 6px;
  --radius-md: 12px;
  --transition-fast: 0.15s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-dark); color: var(--text-main); font-family: var(--font-body); min-height: 100dvh; }
.no-select { user-select: none; -webkit-user-select: none; }

/* Navbar */
.navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; background: rgba(10,10,12,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-dark); position: fixed; top:0; left:0; right:0; z-index:100; }
.brand-logo { font-family: var(--font-display); font-size: 1.8rem; color: var(--accent-red); text-decoration: none; font-weight: 700; border: 2px solid var(--accent-red); padding: 2px 10px; border-radius: var(--radius-sm); }
.nav-links { display: flex; gap: 24px; list-style: none; }
.nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; text-transform: uppercase; transition: color var(--transition-fast); }
.nav-links a:hover, .nav-links a.active { color: var(--text-main); }
.btn-sign-in { background: var(--accent-red); color: #fff; padding: 8px 18px; border-radius: var(--radius-sm); text-decoration: none; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }

@media (max-width: 768px) {
  .nav-links { display: none; }
}
`);

      // -------------------------------------------------------------
      // 4. FILE: data/ placeholders
      // -------------------------------------------------------------
      dataFolder.file("playlist.json", JSON.stringify({
        status: "success",
        data: [
          { id: "1", title: "Master of Puppets", artist: "Metallica", musicalKey: "E", orderIndex: 1 },
          { id: "2", title: "Hotel California", artist: "Eagles", musicalKey: "Bm", orderIndex: 2 }
        ]
      }, null, 2));

      dataFolder.file("calendar.json", JSON.stringify({
        status: "success",
        data: [
          { date: "2026-08-10", memberName: configData.members[0] || "Guitar 1", status: "BUSY", proposalNote: "Out of town" }
        ]
      }, null, 2));

      // -------------------------------------------------------------
      // 5. FILE: .github/workflows/sync-data.yml
      // -------------------------------------------------------------
      workflowsFolder.file("sync-data.yml", `name: Background Data Pipeline Sync

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 03:00 UTC (after Google Apps Script daily scrape)
  workflow_dispatch:

jobs:
  sync-sheets-to-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Data Directory
        run: mkdir -p data

      - name: Fetch Latest Datasets from Google Apps Script
        run: |
          SCRIPT_URL=\$(node -e "const fs = require('fs'); const code = fs.readFileSync('js/config.js', 'utf8'); const match = code.match(/googleScriptUrl:\\s*[\\"']([^\\"'"]+)[\\"']/); console.log(match ? match[1] : '');")
          if [ -n "\$SCRIPT_URL" ]; then
            curl -sL "\${SCRIPT_URL}?action=getPlaylist" -o data/playlist.json
            curl -sL "\${SCRIPT_URL}?action=getCalendar" -o data/calendar.json
          else
            echo "Google Script URL not set in js/config.js. Skipping..."
          fi

      - name: Commit and Push Static Datasets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: Automated background sync [skip ci]"
          file_pattern: "data/*.json"
`);

      // -------------------------------------------------------------
      // 6. FILE: backend/Code.gs
      // -------------------------------------------------------------
      backendFolder.file("Code.gs", `/**
 * BAND APP BACKEND API & SCRAPER ENGINE
 */
function doGet(e) {
  const action = e.parameter.action;
  const sheet = SpreadsheetApp.getActiveSpreadsheet();

  try {
    if (action === 'getPlaylist') {
      const pSheet = sheet.getSheetByName('Playlist');
      const data = pSheet.getDataRange().getValues();
      data.shift(); // Remove header row
      
      let playlist = data.map((row, idx) => ({
        id: row[0] || (idx + 1).toString(),
        title: row[1] || '',
        artist: row[2] || '',
        musicalKey: row[3] || 'C',
        ugUrl: row[4] || '',
        orderIndex: Number(row[5]) || (idx + 1)
      }));
      playlist.sort((a, b) => a.orderIndex - b.orderIndex);
      return sendJSON({ status: 'success', data: playlist });
    }

    if (action === 'getCalendar') {
      const cSheet = sheet.getSheetByName('Calendar');
      const data = cSheet.getDataRange().getValues();
      data.shift();
      const events = data.map(row => ({
        date: row[0], memberName: row[1], status: row[2], proposalNote: row[3]
      }));
      return sendJSON({ status: 'success', data: events });
    }

    return sendJSON({ status: 'error', message: 'Invalid GET action' });
  } catch (err) {
    return sendJSON({ status: 'error', message: err.toString() });
  }
}

function doPost(e) {
  try {
    const contents = JSON.parse(e.postData.contents);
    const action = contents.action;
    const sheet = SpreadsheetApp.getActiveSpreadsheet();

    if (action === 'updateOrder') {
      const pSheet = sheet.getSheetByName('Playlist');
      const newOrder = contents.playlist;
      const data = pSheet.getDataRange().getValues();
      for (let i = 1; i < data.length; i++) {
        const songId = data[i][0].toString();
        const newIndex = newOrder.indexOf(songId);
        if (newIndex !== -1) pSheet.getRange(i + 1, 6).setValue(newIndex + 1);
      }
      return sendJSON({ status: 'success', message: 'Order updated' });
    }

    if (action === 'updateKey') {
      const pSheet = sheet.getSheetByName('Playlist');
      const { songId, newKey } = contents;
      const data = pSheet.getDataRange().getValues();
      for (let i = 1; i < data.length; i++) {
        if (data[i][0].toString() === songId.toString()) {
          pSheet.getRange(i + 1, 4).setValue(newKey);
          break;
        }
      }
      return sendJSON({ status: 'success', message: 'Key updated' });
    }

    if (action === 'setCalendarDate') {
      const cSheet = sheet.getSheetByName('Calendar');
      const { date, memberName, status, proposalNote } = contents;
      cSheet.appendRow([date, memberName, status, proposalNote || '']);
      return sendJSON({ status: 'success', message: 'Calendar updated' });
    }

    return sendJSON({ status: 'error', message: 'Invalid POST action' });
  } catch (err) {
    return sendJSON({ status: 'error', message: err.toString() });
  }
}

function sendJSON(res) {
  return ContentService.createTextOutput(JSON.stringify(res))
    .setMimeType(ContentService.MimeType.JSON);
}
`);

      // -------------------------------------------------------------
      // 7. HTML VIEWS (index, playlist, rehearsal, calendar, fan)
      // -------------------------------------------------------------
      zip.file("index.html", generateIndexHtml(configData));
      zip.file("playlist.html", generatePlaylistHtml(configData));
      zip.file("rehearsal.html", generateRehearsalHtml(configData));
      zip.file("calendar.html", generateCalendarHtml(configData));
      zip.file("fan.html", generateFanHtml(configData));

      // -------------------------------------------------------------
      // 8. ZIP COMPRESSION & TRIGGER DOWNLOAD
      // -------------------------------------------------------------
      logEl.textContent += "📦 Compressing files into ZIP binary...\n";
      const blob = await zip.generateAsync({ type: "blob" });
      const filename = `${configData.bandName.toLowerCase().replace(/[^a-z0-9]/g, '-')}-band-app.zip`;
      
      saveAs(blob, filename);
      logEl.textContent += `✅ SUCCESS! Downloaded ${filename}`;
    }

    // Helper HTML Generator Functions
    function generateNav(activePage, initials) {
      return `<header><nav class="navbar">
        <a href="index.html" class="brand-logo">${initials}</a>
        <ul class="nav-links">
          <li><a href="index.html" class="${activePage === 'index' ? 'active' : ''}">Overview</a></li>
          <li><a href="playlist.html" class="${activePage === 'playlist' ? 'active' : ''}">Repertoire</a></li>
          <li><a href="calendar.html" class="${activePage === 'calendar' ? 'active' : ''}">Schedule</a></li>
          <li><a href="fan.html" class="${activePage === 'fan' ? 'active' : ''}">Encore Game</a></li>
        </ul>
        <a href="rehearsal.html" class="btn-sign-in">SHOW MODE</a>
      </nav></header>`;
    }

    function generateIndexHtml(cfg) {
      return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${cfg.bandName}</title><link rel="stylesheet" href="css/style.css"></head><body>
      ${generateNav('index', cfg.brandInitials)}
      <main style="max-width:800px; margin:140px auto; text-align:center; padding:0 24px;">
        <h1 style="font-family:var(--font-display); font-size:3.5rem; margin-bottom:12px;">${cfg.bandName}</h1>
        <p style="font-size:1.2rem; color:var(--text-muted);">${cfg.taglineLine1} ${cfg.taglineLine2}</p>
      </main>
      <script src="js/config.js"><\/script><script src="js/api.js"><\/script>
      </body></html>`;
    }

    function generatePlaylistHtml(cfg) {
      return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Repertoire — ${cfg.bandName}</title><link rel="stylesheet" href="css/style.css"></head><body class="no-select">
      ${generateNav('playlist', cfg.brandInitials)}
      <main style="max-width:800px; margin:120px auto; padding:0 24px;">
        <h1 style="font-family:var(--font-display); font-size:2.5rem; margin-bottom:20px;">REPERTOIRE</h1>
        <ul id="songList" style="list-style:none; display:flex; flex-direction:column; gap:12px;"></ul>
      </main>
      <script src="js/config.js"><\/script><script src="js/api.js"><\/script>
      <script>
        document.addEventListener("DOMContentLoaded", async () => {
          const list = await ApiService.getPlaylist();
          const ul = document.getElementById('songList');
          ul.innerHTML = list.map(s => \`<li style="background:var(--bg-card); padding:16px; border-radius:8px; border:1px solid var(--border-dark); display:flex; justify-between; align-items:center;">
            <div><strong>\${s.title}</strong> - \${s.artist}</div>
            <span style="color:var(--accent-red); font-weight:bold;">\${s.musicalKey}</span>
          </li>\`).join('');
        });
      <\/script>
      </body></html>`;
    }

    function generateRehearsalHtml(cfg) {
      return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Show Mode — ${cfg.bandName}</title><link rel="stylesheet" href="css/style.css"></head><body>
      ${generateNav('rehearsal', cfg.brandInitials)}
      <main style="max-width:1000px; margin:120px auto; padding:0 24px;">
        <h1 style="font-family:var(--font-display); font-size:2.5rem;">SHOW MODE SETLIST BUILDER</h1>
      </main>
      <script src="js/config.js"><\/script><script src="js/api.js"><\/script>
      </body></html>`;
    }

    function generateCalendarHtml(cfg) {
