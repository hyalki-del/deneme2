<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎸 Band Playlist Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <header>
      <div class="nav-links">
        <a href="playlist.html" class="active">Playlist</a>
        <a href="index.html">Dashboard</a>
        <a href="admin.html">Admin Setup</a>
      </div>
      <h1 id="bandTitle">🎸 Band Playlist</h1>
      <div class="meta-info" id="bandMembers">Loading band info...</div>
    </header>

    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search by song title or artist...">
    
    <div class="stats" id="songStats">Loading songs...</div>

    <div id="songContainer" class="song-list">
      <div class="loading">Loading repertoire from playlist.json...</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const songContainer = document.getElementById('songContainer');
      const searchInput = document.getElementById('searchInput');
      const songStats = document.getElementById('songStats');
      const bandTitle = document.getElementById('bandTitle');
      const bandMembers = document.getElementById('bandMembers');

      let allSongs = [];

      try {
        const [configRes, playlistRes] = await Promise.all([
          fetch('config.json').catch(() => null),
          fetch('playlist.json')
        ]);

        if (configRes && configRes.ok) {
          const config = await configRes.json();
          if (config.bandName) bandTitle.textContent = `🎸 ${config.bandName} Playlist`;
          if (config.bandMembers && Array.isArray(config.bandMembers)) {
            bandMembers.textContent = `Members: ${config.bandMembers.join(', ')}`;
          }
        } else {
          bandMembers.textContent = 'Repertoire Dashboard';
        }

        if (!playlistRes.ok) throw new Error('Failed to load playlist.json');
        allSongs = await playlistRes.json();

        renderSongs(allSongs);

      } catch (error) {
        console.error('Initialization Error:', error);
        songContainer.innerHTML = `<div class="error">❌ Error loading playlist data: ${error.message}<br><small>Ensure playlist.json exists in the root directory.</small></div>`;
        songStats.textContent = '';
      }

      function renderSongs(songsToRender) {
        if (!songsToRender || songsToRender.length === 0) {
          songContainer.innerHTML = `<div class="empty">No songs found in repertoire.</div>`;
          songStats.textContent = 'Showing 0 of 0 songs';
          return;
        }

        songStats.textContent = `Showing ${songsToRender.length} of ${allSongs.length} songs`;

        songContainer.innerHTML = songsToRender.map(song => `
          <div class="song-card">
            <div class="song-details">
              <span class="song-id">#${song.id}</span>
              <div class="song-text">
                <h3>${escapeHtml(song.title)}</h3>
                <p>${escapeHtml(song.artist)}</p>
              </div>
            </div>
            <div class="song-meta">
              ${song.key ? `<span class="song-key" title="Song Key">${escapeHtml(song.key)}</span>` : ''}
              ${song.ugUrl ? `<a href="${escapeHtml(song.ugUrl)}" target="_blank" class="btn-primary" style="padding: 6px 14px; font-size: 0.9rem;">Tab ↗</a>` : ''}
            </div>
          </div>
        `).join('');
      }

      searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        const filtered = allSongs.filter(song => 
          song.title.toLowerCase().includes(term) || 
          song.artist.toLowerCase().includes(term)
        );
        renderSongs(filtered);
      });

      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    });
  </script>
</body>
</html>
