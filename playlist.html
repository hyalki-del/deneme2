<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎸 Band Playlist Dashboard</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-primary: #ffffff;
      --text-secondary: #b3b3b3;
      --accent-color: #1db954;
      --accent-hover: #1ed760;
      --border-color: #333333;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      color: var(--text-primary);
    }

    .meta-info {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .search-bar {
      width: 100%;
      padding: 12px 16px;
      box-sizing: border-box;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar:focus {
      border-color: var(--accent-color);
    }

    .stats {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 15px;
    }

    .song-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .song-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.15s ease, background-color 0.15s ease;
    }

    .song-card:hover {
      background-color: #252525;
      transform: translateY(-2px);
    }

    .song-details {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-grow: 1;
    }

    .song-id {
      font-weight: bold;
      color: var(--text-secondary);
      min-width: 30px;
    }

    .song-text h3 {
      margin: 0 0 4px 0;
      font-size: 1.1rem;
      color: var(--text-primary);
    }

    .song-text p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .song-meta {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .song-key {
      background-color: #333;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: bold;
      min-width: 25px;
      text-align: center;
    }

    .btn-ug {
      background-color: var(--accent-color);
      color: #000;
      padding: 8px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.9rem;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    .btn-ug:hover {
      background-color: var(--accent-hover);
    }

    .loading, .error, .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .error { color: #ff5555; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1 id="bandTitle">🎸 Band Playlist</h1>
      <div class="meta-info" id="bandMembers">Loading band info...</div>
    </header>

    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search by song title or artist...">
    
    <div class="stats" id="songStats">Loading songs...</div>

    <div id="songContainer" class="song-list">
      <div class="loading">Loading repertoire from playlist.json...</div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const songContainer = document.getElementById('songContainer');
      const searchInput = document.getElementById('searchInput');
      const songStats = document.getElementById('songStats');
      const bandTitle = document.getElementById('bandTitle');
      const bandMembers = document.getElementById('bandMembers');

      let allSongs = [];

      try {
        const [configRes, playlistRes] = await Promise.all([
          fetch('config.json').catch(() => null),
          fetch('playlist.json')
        ]);

        if (configRes && configRes.ok) {
          const config = await configRes.json();
          if (config.bandName) bandTitle.textContent = `🎸 ${config.bandName} Playlist`;
          if (config.bandMembers && Array.isArray(config.bandMembers)) {
            bandMembers.textContent = `Members: ${config.bandMembers.join(', ')}`;
          }
        } else {
          bandMembers.textContent = 'Repertoire Dashboard';
        }

        if (!playlistRes.ok) throw new Error('Failed to load playlist.json');
        allSongs = await playlistRes.json();

        renderSongs(allSongs);

      } catch (error) {
        console.error('Initialization Error:', error);
        songContainer.innerHTML = `<div class="error">❌ Error loading playlist data: ${error.message}<br><small>Ensure playlist.json exists in the root directory.</small></div>`;
        songStats.textContent = '';
      }

      function renderSongs(songsToRender) {
        if (!songsToRender || songsToRender.length === 0) {
          songContainer.innerHTML = `<div class="empty">No songs found in repertoire.</div>`;
          songStats.textContent = 'Showing 0 of 0 songs';
          return;
        }

        songStats.textContent = `Showing ${songsToRender.length} of ${allSongs.length} songs`;

        songContainer.innerHTML = songsToRender.map(song => `
          <div class="song-card">
            <div class="song-details">
              <span class="song-id">#${song.id}</span>
              <div class="song-text">
                <h3>${escapeHtml(song.title)}</h3>
                <p>${escapeHtml(song.artist)}</p>
              </div>
            </div>
            <div class="song-meta">
              ${song.key ? `<span class="song-key" title="Song Key">${escapeHtml(song.key)}</span>` : ''}
              ${song.ugUrl ? `<a href="${escapeHtml(song.ugUrl)}" target="_blank" class="btn-ug">Tab ↗</a>` : ''}
            </div>
          </div>
        `).join('');
      }

      searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        const filtered = allSongs.filter(song => 
          song.title.toLowerCase().includes(term) || 
          song.artist.toLowerCase().includes(term)
        );
        renderSongs(filtered);
      });

      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
    });
  </script>
</body>
</html>
