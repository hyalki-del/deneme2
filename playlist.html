<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎸 Band Repertoire Setlist</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .song-card { cursor: grab; user-select: none; }
    .song-card:active { cursor: grabbing; }
    .song-card.dragging { opacity: 0.4; border: 2px dashed var(--accent-color); }
    .btn-youtube {
      background-color: #ff0000; color: #fff; padding: 6px 12px; border-radius: 6px;
      text-decoration: none; font-weight: bold; font-size: 0.85rem; display: inline-flex;
      align-items: center; gap: 5px; transition: background-color 0.2s;
    }
    .btn-youtube:hover { background-color: #cc0000; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn-save {
      background-color: var(--accent-color); color: #000; padding: 10px 20px; border: none;
      border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.95rem; transition: background-color 0.2s;
    }
    .btn-save:hover { background-color: var(--accent-hover); }
    #saveStatus { font-size: 0.9rem; font-weight: bold; color: var(--accent-color); }
    
    /* Modal Styles */
    .modal-backdrop {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; z-index: 1000;
    }
    .modal {
      background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px;
      padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .modal h2 { margin-top: 0; margin-bottom: 20px; color: var(--text-primary); }
    .modal .form-group { margin-bottom: 15px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .btn-secondary { background-color: #333; color: #fff; padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-secondary:hover { background-color: #444; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="nav-links">
        <a href="playlist.html" class="active">Playlist</a>
        <a href="index.html">Dashboard</a>
        <a href="admin.html">Admin Setup</a>
      </div>
      <h1 id="bandTitle">🎸 Band Repertoire</h1>
      <div class="meta-info" id="bandMembers">Loading band info...</div>
    </header>

    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search by song title or artist...">
    
    <div class="toolbar">
      <div class="stats" id="songStats">Loading songs...</div>
      <button id="saveOrderBtn" class="btn-save">💾 Save Order & Keys to Google Sheets</button>
    </div>
    <div id="saveStatus" style="margin-bottom: 15px;"></div>

    <div id="songContainer" class="song-list">
      <div class="loading">Loading repertoire...</div>
    </div>
  </div>

  <!-- Key Edit Modal -->
  <div id="editModal" class="modal-backdrop">
    <div class="modal">
      <h2 id="modalSongTitle">Edit Song Key</h2>
      <form id="editForm">
        <div class="form-group">
          <label for="editKey">Song Key:</label>
          <input type="text" id="editKey" placeholder="e.g. Am, G, C#">
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary" style="width: auto;">Apply Key</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const songContainer = document.getElementById('songContainer');
      const searchInput = document.getElementById('searchInput');
      const songStats = document.getElementById('songStats');
      const bandTitle = document.getElementById('bandTitle');
      const bandMembers = document.getElementById('bandMembers');
      const saveOrderBtn = document.getElementById('saveOrderBtn');
      const saveStatus = document.getElementById('saveStatus');
      
      const editModal = document.getElementById('editModal');
      const editForm = document.getElementById('editForm');
      const modalSongTitle = document.getElementById('modalSongTitle');
      const editKey = document.getElementById('editKey');
      const cancelModalBtn = document.getElementById('cancelModalBtn');

      let allSongs = [];
      let sheetsDeployUrl = '';
      let currentEditingSongTitle = null;

      try {
        const [configRes, playlistRes] = await Promise.all([
          fetch('config.json').catch(() => null),
          fetch('playlist.json')
        ]);

        if (configRes && configRes.ok) {
          const config = await configRes.json();
          if (config.bandName) bandTitle.textContent = `🎸 ${config.bandName} Setlist`;
          if (config.bandMembers) bandMembers.textContent = `Members: ${config.bandMembers.join(', ')}`;
          if (config.googleSheetsDeployUrl) sheetsDeployUrl = config.googleSheetsDeployUrl;
        }

        if (!playlistRes.ok) throw new Error('Failed to load playlist.json');
        allSongs = await playlistRes.json();

        // Fetch custom state (unified order and keys) from Google Sheets
        if (sheetsDeployUrl) {
          try {
            const sheetRes = await fetch(`${sheetsDeployUrl}?action=getCustomState`);
            const sheetData = await sheetRes.json();
            
            if (sheetData && sheetData.metadata) {
              allSongs = allSongs.map(song => {
                const meta = sheetData.metadata[song.title.toLowerCase().trim()];
                if (meta && meta.key) {
                  return { ...song, key: meta.key };
                }
                return song;
              });
            }

            if (sheetData && Array.isArray(sheetData.order) && sheetData.order.length > 0) {
              allSongs = sortSongsByCustomOrder(allSongs, sheetData.order);
            }
          } catch (err) {
            console.warn('Could not fetch custom sheet state, using default playlist.json order.', err);
          }
        }

        renderSongs(allSongs);

      } catch (error) {
        console.error('Initialization Error:', error);
        songContainer.innerHTML = `<div class="error">❌ Error loading data: ${error.message}</div>`;
      }

      function sortSongsByCustomOrder(songs, orderList) {
        const songMap = new Map(songs.map(s => [s.title.toLowerCase().trim(), s]));
        const sorted = [];
        
        orderList.forEach(title => {
          const key = title.toLowerCase().trim();
          if (songMap.has(key)) {
            sorted.push(songMap.get(key));
            songMap.delete(key);
          }
        });
        
        songMap.forEach(s => sorted.push(s));
        return sorted.map((s, index) => ({ ...s, id: index + 1 }));
      }

      function renderSongs(songsToRender) {
        if (!songsToRender || songsToRender.length === 0) {
          songContainer.innerHTML = `<div class="empty">No songs found.</div>`;
          songStats.textContent = 'Showing 0 songs';
          return;
        }

        songStats.textContent = `Double click row to edit key • Drag rows to reorder (${songsToRender.length} songs)`;

        songContainer.innerHTML = songsToRender.map((song, index) => `
          <div class="song-card" draggable="true" data-index="${index}" data-title="${escapeHtml(song.title)}">
            <div class="song-details">
              <span class="song-id">#${index + 1}</span>
              <div class="song-text">
                <h3>${escapeHtml(song.title)}</h3>
                <p>${escapeHtml(song.artist)}</p>
              </div>
            </div>
            <div class="song-meta">
              <span class="song-key" title="Song Key">${escapeHtml(song.key || '-')}</span>
              <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(song.artist + ' ' + song.title + ' guitar backing track chord')}" target="_blank" class="btn-youtube">
                ▶ Play
              </a>
            </div>
          </div>
        `).join('');

        initDragAndDrop();
        initDoubleClickEvents();
      }

      function initDragAndDrop() {
        const cards = songContainer.querySelectorAll('.song-card');
        cards.forEach(card => {
          card.addEventListener('dragstart', () => card.classList.add('dragging'));
          card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            updateVisualIds();
          });
        });

        songContainer.addEventListener('dragover', e => {
          e.preventDefault();
          const draggingCard = document.querySelector('.dragging');
          const afterElement = getDragAfterElement(songContainer, e.clientY);
          if (afterElement == null) {
            songContainer.appendChild(draggingCard);
          } else {
            songContainer.insertBefore(draggingCard, afterElement);
          }
        });
      }

      function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.song-card:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
          const box = child.getBoundingClientRect();
          const offset = y - box.top - box.height / 2;
          if (offset < 0 && offset > closest.offset) {
            return { offset: offset, element: child };
          } else {
            return closest;
          }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
      }

      function updateVisualIds() {
        const cardElements = songContainer.querySelectorAll('.song-card');
        cardElements.forEach((card, idx) => {
          const idSpan = card.querySelector('.song-id');
          if (idSpan) idSpan.textContent = `#${idx + 1}`;
        });
      }

      // Save Order & Keys to Google Sheets
      saveOrderBtn.addEventListener('click', async () => {
        const cardElements = songContainer.querySelectorAll('.song-card');
        const itemsToSave = [];
        
        cardElements.forEach(card => {
          const title = card.getAttribute('data-title');
          const songObj = allSongs.find(s => s.title === title);
          itemsToSave.push({
            title: title,
            key: songObj ? songObj.key : ''
          });
        });

        if (!sheetsDeployUrl) {
          alert('Google Sheets Web App URL is missing in config.json.');
          return;
        }

        saveStatus.textContent = '⏳ Saving setlist order & keys to Google Sheets...';
        try {
          await fetch(sheetsDeployUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({
              action: 'saveCustomOrderWithKeys',
              items: itemsToSave
            })
          });
          saveStatus.textContent = '✅ Order & keys successfully saved to Google Sheets!';
          setTimeout(() => { saveStatus.textContent = ''; }, 4000);
        } catch (err) {
          console.error('Failed saving state:', err);
          saveStatus.textContent = '❌ Error saving to Google Sheets.';
        }
      });

      function initDoubleClickEvents() {
        const cards = songContainer.querySelectorAll('.song-card');
        cards.forEach(card => {
          card.addEventListener('dblclick', () => {
            const title = card.getAttribute('data-title');
            const song = allSongs.find(s => s.title === title);
            if (!song) return;

            currentEditingSongTitle = song.title;
            modalSongTitle.textContent = `Edit Key: ${song.title}`;
            editKey.value = song.key || '';

            editModal.style.display = 'flex';
          });
        });
      }

      cancelModalBtn.addEventListener('click', () => {
        editModal.style.display = 'none';
      });

      editForm.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!currentEditingSongTitle) return;

        const newKey = editKey.value.trim();

        // Update local state array
        allSongs = allSongs.map(song => {
          if (song.title === currentEditingSongTitle) {
            return { ...song, key: newKey };
          }
          return song;
        });

        renderSongs(allSongs);
        editModal.style.display = 'none';
        saveStatus.textContent = `💡 Key updated locally for "${currentEditingSongTitle}". Click "Save Order & Keys" to commit to Google Sheets.`;
      });

      searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        const filtered = allSongs.filter(song => 
          song.title.toLowerCase().includes(term) || 
          song.artist.toLowerCase().includes(term)
        );
        renderSongs(filtered);
      });

      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }
    });
  </script>
</body>
</html>
