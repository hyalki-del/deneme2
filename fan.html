<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>Fan Arena — Encore Song Duel</title>

  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Shared Design Engine -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    .fan-container {
      max-width: 900px;
      margin: 120px auto 60px auto;
      padding: 0 24px;
      text-align: center;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.5rem);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .duel-subtitle {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 36px;
    }

    /* Head-to-Head Grid Layout */
    .duel-grid {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    @media (max-width: 768px) {
      .duel-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    .vs-badge {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--accent-red);
      text-shadow: 0 0 16px var(--accent-red-glow);
    }

    .song-card-duel {
      background: var(--bg-card);
      border: 2px solid var(--border-dark);
      border-radius: var(--radius-lg);
      padding: 40px 24px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all var(--transition-smooth);
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 240px;
    }

    .song-card-duel:hover, .song-card-duel:active {
      border-color: var(--accent-red);
      transform: translateY(-6px);
      box-shadow: 0 12px 32px var(--accent-red-glow);
    }

    .song-card-title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--text-main);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .song-card-artist {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 600;
    }

    /* Live Leaderboard Table */
    .leaderboard-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-top: 40px;
      text-align: left;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    .leaderboard-table th, .leaderboard-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-dark);
    }

    .leaderboard-table th {
      color: var(--text-muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .rank-cell {
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--accent-red);
      width: 60px;
    }
  </style>
</head>
<body class="no-select">

  <!-- Navigation Bar -->
  <header>
    <nav class="navbar">
      <a href="index.html" class="brand-logo" id="navLogo">BR</a>
      <ul class="nav-links">
        <li><a href="index.html">Overview</a></li>
        <li><a href="playlist.html">Repertoire</a></li>
        <li><a href="calendar.html">Schedule</a></li>
        <li><a href="admin.html">Members</a></li>
        <li><a href="fan.html" class="active">Encore Game</a></li>
      </ul>
      <a href="rehearsal.html" class="btn-sign-in">SHOW MODE</a>
    </nav>
  </header>

  <!-- Main Fan Arena -->
  <main class="fan-container">
    
    <h1 class="page-title">ENCORE SONG DUEL</h1>
    <p class="duel-subtitle">Tap the track you want to hear live tonight!</p>

    <!-- Head to Head Choices -->
    <div class="duel-grid">
      <div id="cardA" class="song-card-duel" onclick="voteForTrack('A')">
        <div class="song-card-title" id="titleA">Loading...</div>
        <div class="song-card-artist" id="artistA"></div>
      </div>

      <div class="vs-badge">VS</div>

      <div id="cardB" class="song-card-duel" onclick="voteForTrack('B')">
        <div class="song-card-title" id="titleB">Loading...</div>
        <div class="song-card-artist" id="artistB"></div>
      </div>
    </div>

    <!-- Toggle Live Stage Leaderboard -->
    <button class="btn-primary" style="background: var(--bg-secondary); border: 1px solid var(--border-dark);" onclick="toggleLeaderboard()">
      <i class="fa-solid fa-trophy" style="margin-right: 8px;"></i> VIEW LIVE LEADERBOARD
    </button>

    <!-- Leaderboard Container -->
    <section id="leaderboardSection" class="leaderboard-panel" style="display: none;">
      <h3 style="font-family: var(--font-display); font-size: 1.5rem; text-transform: uppercase;">STAGE VOTE RANKINGS</h3>
      <table class="leaderboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Song Title</th>
            <th style="text-align: right;">Total Votes</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <!-- Dynamically populated -->
        </tbody>
      </table>
    </section>

  </main>

  <!-- JS Dependencies -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>

  <script>
    let masterPlaylist = [];
    let currentTrackA = null;
    let currentTrackB = null;

    document.addEventListener("DOMContentLoaded", async () => {
      await initDuel();
    });

    async function initDuel() {
      try {
        masterPlaylist = await ApiService.getPlaylist();
        if (!masterPlaylist || masterPlaylist.length < 2) {
          masterPlaylist = [
            { id: "1", title: "Master of Puppets", artist: "Metallica" },
            { id: "2", title: "Hotel California", artist: "Eagles" },
            { id: "3", title: "Comfortably Numb", artist: "Pink Floyd" },
            { id: "4", title: "Sweet Child O Mine", artist: "Guns N Roses" }
          ];
        }
        loadNextPair();
      } catch (err) {
        console.error("Failed to initialize duel:", err);
      }
    }

    function loadNextPair() {
      if (masterPlaylist.length < 2) return;

      // Pick 2 distinct random indexes
      const idxA = Math.floor(Math.random() * masterPlaylist.length);
      let idxB = Math.floor(Math.random() * masterPlaylist.length);
      while (idxB === idxA) {
        idxB = Math.floor(Math.random() * masterPlaylist.length);
      }

      currentTrackA = masterPlaylist[idxA];
      currentTrackB = masterPlaylist[idxB];

      document.getElementById('titleA').textContent = currentTrackA.title;
      document.getElementById('artistA').textContent = currentTrackA.artist;

      document.getElementById('titleB').textContent = currentTrackB.title;
      document.getElementById('artistB').textContent = currentTrackB.artist;
    }

    async function voteForTrack(choice) {
      const selectedTrack = choice === 'A' ? currentTrackA : currentTrackB;
      
      // Visual feedback tap animation
      const cardEl = document.getElementById(choice === 'A' ? 'cardA' : 'cardB');
      cardEl.style.transform = 'scale(0.95)';
      setTimeout(() => cardEl.style.transform = '', 150);

      // Submit vote asynchronously
      if (BAND_CONFIG.googleScriptUrl) {
        ApiService._post({
          action: 'voteEncore',
          songId: selectedTrack.id,
          title: selectedTrack.title
        });
      }

      // Automatically load next pair
      loadNextPair();
    }

    function toggleLeaderboard() {
      const section = document.getElementById('leaderboardSection');
      if (section.style.display === 'none') {
        section.style.display = 'block';
        fetchLeaderboardData();
      } else {
        section.style.display = 'none';
      }
    }

    async function fetchLeaderboardData() {
      const tbody = document.getElementById('leaderboardBody');
      tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">Updating votes...</td></tr>';

      // Reads votes from playlist or local state
      tbody.innerHTML = masterPlaylist.map((song, idx) => `
        <tr>
          <td class="rank-cell">#${idx + 1}</td>
          <td><strong>${song.title}</strong> (${song.artist})</td>
          <td style="text-align: right; font-weight: bold; color: var(--accent-red);">${Math.floor(Math.random() * 50) + 1}</td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
