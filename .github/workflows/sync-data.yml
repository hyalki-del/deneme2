name: Background Data Pipeline Sync

on:
  schedule:
    # Runs automatically every 6 hours
    - cron: '0 */6 * * *'
  # Allows manual background sync trigger anytime via GitHub Actions UI
  workflow_dispatch:

jobs:
  sync-sheets-to-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Data Directory
        run: mkdir -p data

      - name: Fetch Latest Playlist Data from Google Sheets
        run: |
          # Reads script URL from js/config.js or fallback endpoint
          SCRIPT_URL=$(node -e "const fs = require('fs'); const code = fs.readFileSync('js/config.js', 'utf8'); const match = code.match(/googleScriptUrl:\s*[\"']([^\"']+)[\"']/); console.log(match ? match[1] : '');")
          if [ -n "$SCRIPT_URL" ]; then
            curl -sL "${SCRIPT_URL}?action=getPlaylist" -o data/playlist.json
            curl -sL "${SCRIPT_URL}?action=getCalendar" -o data/calendar.json
          else
            echo "Google Script URL not configured in js/config.js"
            exit 1
          fi

      - name: Commit and Push Updated Static Datasets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: Automated background sync from Google Sheets [skip ci]"
          file_pattern: "data/*.json"
