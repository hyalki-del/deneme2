name: Daily Ultimate Guitar Sync

on:
  schedule:
    # Runs automatically at 00:00 UTC every day
    - cron: '0 0 * * *'
  # Enables the manual 'Run workflow' button in GitHub Actions tab
  workflow_dispatch:

jobs:
  sync-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run UG Playlist Fetcher
        run: python scripts/fetch_ug_playlist.py

      - name: Commit and Push Updated Playlist
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add config.json playlist.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update UG Playlist [cron]"
          git push
