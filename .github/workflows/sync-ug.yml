name: Daily Ultimate Guitar Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Execute Scraper Pipeline
        env:
          PYTHONUNBUFFERED: "1"
        run: python scripts/fetch_ug_playlist.py

      - name: Commit and Push Updated Playlist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          [ -f playlist.json ] || echo "[]" > playlist.json
          
          git add playlist.json config.json
          
          if ! git diff --staged --quiet; then
            git commit -m "build(cron): auto-sync playlist.json"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
