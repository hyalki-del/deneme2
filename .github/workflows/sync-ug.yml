name: Sync Ultimate Guitar Repertoire

on:
  schedule:
    - cron: '0 3 * * *' # Runs daily at 3:00 AM UTC
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # 🛡️ Prevents the job from hanging indefinitely

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper and Sync Pipeline
        run: python scripts/fetch_ug_playlist.py

      - name: Commit and Push Changes if playlist or lyrics updated
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlist.json lyrics/
          git diff --staged --quiet || git commit -m "Auto-sync Ultimate Guitar playlist and lyrics [skip ci]"
          git push
